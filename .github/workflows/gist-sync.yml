name: Sync Gists

on:
  push:
    branches: ["main"]
    paths:
      - "extras/templates/tool/**"
      - "extras/tools/**"

jobs:
  sync-tool-template:
    name: Sync tool template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync tool template to gist
        uses: xSAVIKx/gist-uploader-action@v0.1.3
        with:
          gist_id: "f53f93730cc25b54dbaa66f8cb6ed8b3"
          gist_file_name: "template.py"
          file_path: "extras/templates/tool/template.py"
          token: ${{ secrets.GITHUB_TOKEN }}

  sync-chat-reloader:
    name: Sync chat-reloader tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync chat-reloader to gist
        uses: xSAVIKx/gist-uploader-action@v0.1.3
        with:
          gist_id: "f53f93730cc25b54dbaa66f8cb6ed8b3"
          gist_file_name: "chat-reloader.py"
          file_path: "extras/tools/chat-reloader.py"
          token: ${{ secrets.GITHUB_TOKEN }}
